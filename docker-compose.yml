version: '3.3'

services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      - DISCORD_APIKEY=${DISCORD_APIKEY}
      - DISCORD_CLIENTID=${DISCORD_CLIENTID}
      - OPENROUTER_APIKEY=${OPENROUTER_APIKEY}
      - OPENAI_APIKEY=${OPENAI_APIKEY}
      - OPENAI_ORG=${OPENAI_ORG}
      - OPENAI_PROJECT=${OPENAI_PROJECT}
      - FIRECRAWL_APIKEY=${FIRECRAWL_APIKEY}
      - RESEND_APIKEY=${RESEND_APIKEY}
      - RESEND_FROM=${RESEND_FROM}
      - INBOUND_EMAIL_PORT=${INBOUND_EMAIL_PORT}
      - INBOUND_EMAIL_CHANNEL_ID=${INBOUND_EMAIL_CHANNEL_ID}
    ports:
      - "3001:3001"
    volumes:
      - db-data:/app/data

volumes:
  db-data:
